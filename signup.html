<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LG Digital Media</title>
  <link rel="stylesheet" href="styles.css">
  <link
    rel="stylesheet"
    href="https://use.fontawesome.com/releases/v5.14.0/css/all.css"
    integrity="sha384-HzLeBuhoNPvSl5KYnjx0BT+WB0QEEqLprO+NBkkk5gbc67FTaL7XIGa2w1L0Xbgc"
    crossorigin="anonymous">
  <link
    href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <nav class="navbar">
    <div class="navbar__container">
      <a href="index.html" id="navbar__logo">L-G</a>
      <div class="navbar__toggle" id="mobile-menu">
        <span class="bar"></span> <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <ul class="navbar__menu">
        <li class="navbar__item"><a href="index.html" class="navbar__links">Home</a></li>
        <li class="navbar__item"><a href="portfolio.html" class="navbar__links">Portfolio</a></li>
        <li class="navbar__item"><a href="bio.html" class="navbar__links">Bio</a></li>
        <li class="navbar__btn"><a href="signup.html" class="button">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
  <form action="https://formspree.io/f/xdayvbrq" method="POST">
    <div class="main__content">
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="first_name" placeholder="Your name" required>

      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="last_name" placeholder="Your last name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Your email" required>

      <label for="country">Country</label>
      <select id="country" name="country">
        <option value="usa">USA</option>
        <option value="canada">Canada</option>
        <option value="australia">Australia</option>
      </select>

      <label for="subject">Message</label>
      <textarea id="subject" name="message" placeholder="Write something.." style="height:200px" required></textarea>
    </div>

    <input type="submit" value="Submit">
  </form>
</div>

  <div class="footer__container">
    <div class="social__media">
      <div class="social__media--wrap">
        <div class="footer__logo">
          <a href="/" id="footer__logo">L-G</a>
        </div>
        <p class="website__rights">© L-G 2024. All rights reserved</p>
        <div class="social__icons">
          <a class="social__icon--link" href="https://www.facebook.com/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
          <a class="social__icon--link" href="https://www.instagram.com/" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a class="social__icon--link" href="https://x.com/" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
          <a class="social__icon--link" href="https://www.linkedin.com/home" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
